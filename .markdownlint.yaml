# markdownlint configuration for mind-flow blog
# Strict rules for consistent rendering on GitHub and MkDocs Material
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD001 - Heading levels should only increment by one level at a time
MD001: true

# MD003 - Heading style
MD003:
  style: atx  # Use # style headings

# MD004 - Unordered list style
MD004:
  style: dash  # Use - for unordered lists

# MD007 - Unordered list indentation
MD007:
  indent: 2  # Consistent 2-space indentation

# MD009 - Trailing spaces
MD009:
  br_spaces: 2  # Allow 2 trailing spaces for line breaks
  list_item_empty_lines: false
  strict: false

# MD010 - Hard tabs
MD010:
  code_blocks: false  # Allow tabs in code blocks (Makefiles), but not in prose

# MD012 - Multiple consecutive blank lines
MD012:
  maximum: 2

# MD013 - Line length (disabled - prose can be long)
MD013: false

# MD022 - Headings should be surrounded by blank lines
MD022: true

# MD023 - Headings must start at the beginning of the line
MD023: true

# MD024 - Multiple headings with the same content (disabled - common in blog posts)
MD024: false

# MD025 - Multiple top-level headings
MD025: true

# MD026 - Trailing punctuation in heading
MD026:
  punctuation: ".,;:!"

# MD027 - Multiple spaces after blockquote symbol
MD027: true

# MD028 - Blank line inside blockquote
MD028: true

# MD029 - Ordered list item prefix
MD029:
  style: ordered  # Enforce sequential numbering: 1. 2. 3.

# MD030 - Spaces after list markers
MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

# MD031 - Fenced code blocks should be surrounded by blank lines
MD031: true

# MD032 - Lists should be surrounded by blank lines
MD032: true

# MD033 - Inline HTML (disabled - MkDocs uses HTML comments for tags, and img tags for thumbnails)
MD033: false

# MD034 - Bare URL used
MD034: true

# MD035 - Horizontal rule style
MD035:
  style: consistent

# MD036 - Emphasis used instead of a heading (disabled - bold text for emphasis is OK)
MD036: false

# MD037 - Spaces inside emphasis markers
MD037: true

# MD038 - Spaces inside code span elements
MD038: true

# MD039 - Spaces inside link text
MD039: true

# MD040 - Fenced code blocks should have a language specified
MD040: true

# MD041 - First line in file should be a top-level heading
MD041: true

# MD042 - No empty links
MD042: true

# MD045 - Images should have alternate text (alt text)
MD045: true

# MD046 - Code block style
MD046:
  style: fenced  # Prefer fenced code blocks

# MD047 - Files should end with a single newline character
MD047: true

# MD048 - Code fence style
MD048:
  style: backtick  # Use ``` not ~~~

# MD049 - Emphasis style
MD049:
  style: asterisk  # Use * not _

# MD050 - Strong style
MD050:
  style: asterisk  # Use ** not __

# MD051 - Link fragments should be valid
MD051: true

# MD052 - Reference links and images should use a label that is defined
MD052: true

# MD053 - Link and image reference definitions should be needed
MD053: true

# MD060 - Table column style (disabled - alignment not critical for rendering)
MD060: false
